name: Publish to PyPI

# Publishes to PyPI when you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets required.
# See RELEASING.md for one-time setup.

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual publish (e.g. the first bootstrap release)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # matches the PyPI trusted-publisher config
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
